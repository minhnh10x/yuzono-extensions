name: Build & Publish Custom Extensions

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:   # chạy thủ công

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode signing key
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > /tmp/signing-key.jks

      - name: Read extension list & build
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Đọc danh sách extension (bỏ qua comment và dòng trống)
          MODULES=$(grep -v '^\s*#' .github/extension-list.txt | grep -v '^\s*$' | \
            sed 's|src/||;s|/|_|g;s|^|:src:|' | tr '\n' ' ')
          
          echo "Building modules: $MODULES"
          
          ./gradlew $MODULES \
            -Psigning.keyFile=/tmp/signing-key.jks \
            -Psigning.storePassword="$KEY_STORE_PASSWORD" \
            -Psigning.keyAlias="$KEY_ALIAS" \
            -Psigning.keyPassword="$KEY_PASSWORD" \
            --no-daemon

      - name: Collect APKs
        run: |
          mkdir -p /tmp/apk-output
          find . -name "*.apk" -path "*/release/*" | while read apk; do
            cp "$apk" /tmp/apk-output/
          done
          echo "APKs built:"
          ls /tmp/apk-output/

      - name: Upload APKs artifact
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: /tmp/apk-output/*.apk
          retention-days: 1

  publish:
    name: Publish to my-extensions repo
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout extensions-source (for scripts)
        uses: actions/checkout@v4
        with:
          path: extensions-source

      - name: Checkout my-extensions repo (branch: repo)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/my-extensions
          ref: repo
          token: ${{ secrets.PAT_TOKEN }}
          path: my-extensions

      - name: Download built APKs
        uses: actions/download-artifact@v4
        with:
          name: apks
          path: /tmp/new-apks

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python deps
        run: pip install Pillow --break-system-packages 2>/dev/null || pip install Pillow

      - name: Download extensions-inspector
        run: |
          INSPECTOR_URL=$(curl -s https://api.github.com/repos/keiyoushi/extensions-inspector/releases/latest \
            | jq -r '.assets[0].browser_download_url')
          curl -L "$INSPECTOR_URL" -o /tmp/inspector.jar

      - name: Copy new APKs into repo
        run: |
          cp /tmp/new-apks/*.apk my-extensions/apk/ 2>/dev/null || true

      - name: Generate index.min.json
        run: |
          cd my-extensions

          # Chạy inspector để tạo metadata
          java -jar /tmp/inspector.jar \
            apk/ \
            --output index.json \
            --pretty

          # Tạo index.min.json (minified)
          python3 -c "
          import json
          with open('index.json') as f:
              data = json.load(f)
          with open('index.min.json', 'w') as f:
              json.dump(data, f, separators=(',', ':'))
          print(f'Generated index with {len(data)} extensions')
          "

      - name: Commit & push to my-extensions
        run: |
          cd my-extensions
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add apk/ index.json index.min.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update extensions $(date +'%Y-%m-%d %H:%M')"
            git push origin repo
          fi

      - name: Print repo URL
        run: |
          echo "✅ Repo URL để thêm vào app:"
          echo "https://raw.githubusercontent.com/${{ github.repository_owner }}/my-extensions/repo/index.min.json"
